name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install git+https://github.com/mevtc/pki-core.git@main
      - run: pip install -e ".[dev]"
      - run: mypy src/pki/federal

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install git+https://github.com/mevtc/pki-core.git@main
      - run: pip install -e ".[dev]" bandit pip-audit cyclonedx-bom
      - run: bandit -r src/pki/federal -c pyproject.toml --severity-level high
      - run: pip-audit
      - run: cyclonedx-py environment -o sbom.cdx.json --of json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install git+https://github.com/mevtc/pki-core.git@main
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short --ignore=tests/test_fuzz_cn_parsers.py

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install git+https://github.com/mevtc/pki-core.git@main
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_fuzz_cn_parsers.py --hypothesis-profile=ci -v
