stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

default:
  image: python:3.13-slim
  before_script:
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .pip-cache/

ruff:
  stage: lint
  before_script:
    - pip install ruff
  script:
    - ruff check .
    - ruff format --check .

mypy:
  stage: lint
  script:
    - mypy federal_pki

bandit:
  stage: lint
  script:
    - bandit -r federal_pki -c pyproject.toml

pip-audit:
  stage: lint
  script:
    - pip install pip-audit
    - pip-audit .

pytest:
  stage: test
  script:
    - pytest --tb=short -q
  needs: []